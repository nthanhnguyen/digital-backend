version: '3.8'

services:
  postgres:
    image: postgres:14.9
    container_name: auth-postgres
    environment:
      POSTGRES_USER: jamesnguyen
      POSTGRES_PASSWORD: nguyen123
      POSTGRES_DB: digital-wallet-db
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jamesnguyen -d digital-wallet-db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
